<!DOCTYPE html>
<html>

<head>
    <!-- include A-Frame obviously -->
    <script src="https://aframe.io/releases/0.6.0/aframe.min.js"></script>
    <!-- include ar.js for A-Frame -->
    <script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style='margin : 0px; overflow: hidden;'>
    <a-scene embedded arjs>
        
        <a-assets>
            <a-asset-item id="prmdobj" src="assets/artifacts/pyramide.obj"></a-asset-item>
            <a-asset-item id="prmdmtl" src="assets/artifacts/pyramide.mtl"></a-asset-item>
        </a-assets>

        <a-marker preset='custom' type="pattern" url="assets/custom_marker/pattern-thimira.patt">

            <a-entity obj-model="obj: #prmdobj; 
                mtl: #prmdmtl " position="0 0.8 0" rotation="0 -45 0" 
                scale="4 4 4">
            </a-entity>
			
			<a-entity position="0 0.3 1" text = "value: Pyramide; color: blue; wrap-count: 10"></a-entity>
			<a-entity position="0 0 1" text = "value: Kavinda K.T.S IT18146820; color: white; wrap-count: 15"></a-entity>

        </a-marker>
        
        <a-entity camera></a-entity>

    </a-scene>
</body>

</html>
