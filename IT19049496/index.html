<!DOCTYPE html>
<html>

<head>
    <!-- include A-Frame obviously -->
    <script src="https://aframe.io/releases/0.6.0/aframe.min.js"></script>
    <!-- include ar.js for A-Frame -->
    <script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style='margin : 0px; overflow: hidden;'>
    <a-scene embedded arjs>
        
        <a-assets>
            <a-asset-item id="modelobj" src="assets/artifacts/model.obj"></a-asset-item>
            <a-asset-item id="modelmtl" src="assets/artifacts/model.mtl"></a-asset-item>
        </a-assets>

        <a-marker preset='custom' type="pattern" url="assets/custom_marker/pattern-deshitha.patt">

            <a-entity obj-model="obj: #modelobj; 
                mtl: #modelmtl " position="0 0.8 0" rotation="-90 -45 0" 
                scale="0.005 0.005 0.005">
            </a-entity>
			
			<a-entity position="0 0.3 1" text = "value: Moai; color: blue; wrap-count: 10"></a-entity>
			<a-entity position="0 0 1" text = "value: Deshitha Thilindra H.B IT19049496; color: white; wrap-count: 18"></a-entity>

        </a-marker>        

        <a-entity camera></a-entity>

    </a-scene>
</body>

</html>
