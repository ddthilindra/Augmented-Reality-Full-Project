<!DOCTYPE html>
<html>

<head>
    <!-- include A-Frame obviously -->
    <script src="https://aframe.io/releases/0.6.0/aframe.min.js"></script>
    <!-- include ar.js for A-Frame -->
    <script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style='margin : 0px; overflow: hidden;'>
    <a-scene embedded arjs>
        
        <a-assets>
            <a-asset-item id="3dobj" src="assets/artifacts/picc.obj"></a-asset-item>
            <a-asset-item id="3dmtl" src="assets/artifacts/picc.mtl"></a-asset-item>
        </a-assets>

        <a-marker preset='custom' type="pattern" url="assets/custom_marker/pattern-sandun.patt">

            <a-entity obj-model="obj: #3dobj; 
                mtl: #3dmtl " position="0 0.8 0" rotation="0 45 0" 
                scale="0.00038 0.00038 0.00038">
            </a-entity>
			
			<a-entity position="0 0.3 1" text = "value: Maison Carrée; color: blue; wrap-count: 12"></a-entity>
			<a-entity position="0 0 1" text = "value: Sandun Samaranayake S.G  IT19055954; color: white; wrap-count: 22"></a-entity>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>
</body>

</html>
